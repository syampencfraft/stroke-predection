{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="glass-card p-5 animate-fade">
                <div class="text-center mb-5">
                    <div class="display-6 text-accent mb-3"><i class="fas fa-heartbeat" style="color: var(--primary-accent);"></i></div>
                    <h2 class="fw-bold">Stroke Risk Assessment</h2>
                    <p class="text-muted">Fill in the clinical parameters below for a precision AI analysis.</p>
                </div>

                <form action="{% url 'predict' %}" method="POST" class="row g-4">
                    {% csrf_token %}
                    
                    <!-- Clinical Demographics -->
                    <div class="col-12">
                        <h5 class="text-accent mb-3" style="color: var(--primary-accent);"><i class="fas fa-id-card me-2"></i>Demographics</h5>
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option value="Male" {% if initial_data.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if initial_data.gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if initial_data.gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Age</label>
                        <input type="number" step="0.1" class="form-control" name="age" placeholder="e.g. 45" value="{{ initial_data.age }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Residence</label>
                        <select class="form-select" name="residence_type" required>
                            <option value="Urban" {% if initial_data.residence_type == 'Urban' %}selected{% endif %}>Urban</option>
                            <option value="Rural" {% if initial_data.residence_type == 'Rural' %}selected{% endif %}>Rural</option>
                        </select>
                    </div>

                    <!-- Medical History -->
                    <div class="col-12 mt-5">
                        <h5 class="text-accent mb-3" style="color: var(--primary-accent);"><i class="fas fa-file-medical me-2"></i>Medical History</h5>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Hypertension</label>
                        <select class="form-select" name="hypertension" required>
                            <option value="0" {% if initial_data.hypertension == 0 %}selected{% endif %}>No</option>
                            <option value="1" {% if initial_data.hypertension == 1 %}selected{% endif %}>Yes</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Heart Disease</label>
                        <select class="form-select" name="heart_disease" required>
                            <option value="0" {% if initial_data.heart_disease == 0 %}selected{% endif %}>No</option>
                            <option value="1" {% if initial_data.heart_disease == 1 %}selected{% endif %}>Yes</option>
                        </select>
                    </div>

                    <!-- Lifestyle & Physiological -->
                    <div class="col-12 mt-5">
                        <h5 class="text-accent mb-3" style="color: var(--primary-accent);"><i class="fas fa-vial me-2"></i>Physiological Data</h5>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Avg Glucose Level (mg/dL)</label>
                        <input type="number" step="0.01" class="form-control" name="avg_glucose_level" placeholder="e.g. 95.5" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" step="0.1" class="form-control" name="height" placeholder="e.g. 175" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" class="form-control" name="weight" placeholder="e.g. 70" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Smoking Status</label>
                        <select class="form-select" name="smoking_status" required>
                            <option value="never smoked" {% if initial_data.smoking_status == 'never smoked' %}selected{% endif %}>Never Smoked</option>
                            <option value="formerly smoked" {% if initial_data.smoking_status == 'formerly smoked' %}selected{% endif %}>Formerly Smoked</option>
                            <option value="smokes" {% if initial_data.smoking_status == 'smokes' %}selected{% endif %}>Smokes</option>
                            <option value="Unknown" {% if initial_data.smoking_status == 'Unknown' %}selected{% endif %}>Unknown</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Work Type</label>
                        <select class="form-select" name="work_type" required>
                            <option value="Private" {% if initial_data.work_type == 'Private' %}selected{% endif %}>Private</option>
                            <option value="Self-employed" {% if initial_data.work_type == 'Self-employed' %}selected{% endif %}>Self-employed</option>
                            <option value="Govt_job" {% if initial_data.work_type == 'Govt_job' %}selected{% endif %}>Govt Job</option>
                            <option value="children" {% if initial_data.work_type == 'children' %}selected{% endif %}>Children</option>
                            <option value="Never_worked" {% if initial_data.work_type == 'Never_worked' %}selected{% endif %}>Never Worked</option>
                        </select>
                    </div>
                    
                    <!-- Hidden field to match ever_married if needed, otherwise add it -->
                    <input type="hidden" name="ever_married" value="{{ initial_data.ever_married|default:'Yes' }}">

                    <div class="col-12 mt-5 text-center">
                        <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                            <button type="submit" class="btn btn-premium px-5 py-3 shadow-lg flex-md-grow-1">
                                <i class="fas fa-microchip me-2"></i>Run AI Analysis
                            </button>
                            <a href="{% if user.doctorprofile %}{% url 'doctor_dashboard' %}{% else %}{% url 'history' %}{% endif %}" class="btn btn-outline-secondary px-5 py-3 rounded-pill text-white border-secondary">
                                Cancel
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Custom styling for inputs to match the dark theme */
    .form-control, .form-select {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        border-radius: 12px !important;
        padding: 0.75rem 1rem;
        transition: all 0.3s;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--primary-accent) !important;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2) !important;
        background: rgba(255, 255, 255, 0.05) !important;
    }
    .form-select option {
        background: #1a1a1a;
        color: white;
    }
</style>
{% endblock %}
