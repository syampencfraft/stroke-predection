{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card p-5 animate-up">
                <h2 class="text-center mb-4 fw-bold">Stroke Risk Assessment</h2>
                <p class="text-center text-muted mb-5">Fill in the patient details below for an ML-powered stroke risk
                    analysis.</p>

                <form action="{% url 'predict' %}" method="POST" class="row g-3">
                    {% csrf_token %}
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select rounded-pill" name="gender" required>
                            <option value="Male" {% if initial_data.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if initial_data.gender == 'Female' %}selected{% endif %}>Female
                            </option>
                            <option value="Other" {% if initial_data.gender == 'Other' %}selected{% endif %}>Other
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" step="0.1" class="form-control rounded-pill" name="age"
                            placeholder="e.g. 45" value="{{ initial_data.age }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Hypertension</label>
                        <select class="form-select rounded-pill" name="hypertension" required>
                            <option value="0" {% if initial_data.hypertension == 0 %}selected{% endif %}>No</option>
                            <option value="1" {% if initial_data.hypertension == 1 %}selected{% endif %}>Yes</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Heart Disease</label>
                        <select class="form-select rounded-pill" name="heart_disease" required>
                            <option value="0" {% if initial_data.heart_disease == 0 %}selected{% endif %}>No</option>
                            <option value="1" {% if initial_data.heart_disease == 1 %}selected{% endif %}>Yes</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ever Married</label>
                        <select class="form-select rounded-pill" name="ever_married" required>
                            <option value="Yes" {% if initial_data.ever_married == 'Yes' %}selected{% endif %}>Yes
                            </option>
                            <option value="No" {% if initial_data.ever_married == 'No' %}selected{% endif %}>No</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Work Type</label>
                        <select class="form-select rounded-pill" name="work_type" required>
                            <option value="Private" {% if initial_data.work_type == 'Private' %}selected{% endif %}>
                                Private</option>
                            <option value="Self-employed" {% if initial_data.work_type == 'Self-employed' %}selected
                                {% endif %}>Self-employed</option>
                            <option value="Govt_job" {% if initial_data.work_type == 'Govt_job' %}selected{% endif %}>Govt
                                Job</option>
                            <option value="children" {% if initial_data.work_type == 'children' %}selected{% endif %}>
                                Children</option>
                            <option value="Never_worked" {% if initial_data.work_type == 'Never_worked' %}selected{% endif %}
                               >Never Worked</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Residence Type</label>
                        <select class="form-select rounded-pill" name="residence_type" required>
                            <option value="Urban" {% if initial_data.residence_type == 'Urban' %}selected{% endif %}>Urban
                            </option>
                            <option value="Rural" {% if initial_data.residence_type == 'Rural' %}selected{% endif %}>Rural
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Smoking Status</label>
                        <select class="form-select rounded-pill" name="smoking_status" required>
                            <option value="never smoked" {% if initial_data.smoking_status == 'never smoked' %}selected
                                {% endif %}>Never Smoked</option>
                            <option value="formerly smoked" {% if initial_data.smoking_status == 'formerly smoked' %}
                                selected{% endif %}>Formerly Smoked</option>
                            <option value="smokes" {% if initial_data.smoking_status == 'smokes' %}selected{% endif %}>
                                Smokes</option>
                            <option value="Unknown" {% if initial_data.smoking_status == 'Unknown' %}selected{% endif %}>
                                Unknown</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Avg Glucose Level</label>
                        <input type="number" step="0.01" class="form-control rounded-pill" name="avg_glucose_level"
                            placeholder="e.g. 95.5" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" step="0.1" class="form-control rounded-pill" name="height"
                            placeholder="e.g. 175" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" class="form-control rounded-pill" name="weight"
                            placeholder="e.g. 70" required>
                    </div>
                    <div class="col-12 text-center mt-5">
                        <button type="submit" class="btn btn-premium w-100 py-3 rounded-pill">Analyze Risk</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
